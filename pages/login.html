<!-- Login Layout overriding Main Layout styling for this speciifc page -->
<style>
    /* Hide Sidebar and Header when on login page */
    #sidebar,
    header,
    #logout-btn {
        display: none !important;
    }

    #main-content {
        padding: 0 !important;
        background-color: #f1f5f9;
    }
</style>

<div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary/20 rounded-full blur-3xl z-0"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl z-0"></div>

    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-md relative z-10 border border-slate-100">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-blue-600 text-white text-3xl mb-4 shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-users-gear"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">تسجيل الدخول للنظام</h2>
            <p class="text-slate-500 mt-2 text-sm">أدخل بيانات الاعتماد الخاصة بك للوصول لنظام الموارد البشرية</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">البريد الإلكتروني</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-3 text-slate-400"></i>
                    <input type="email" id="login-email" required
                        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 pl-10 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-left"
                        dir="ltr" placeholder="admin@example.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">كلمة المرور</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3 text-slate-400"></i>
                    <input type="password" id="login-password" required
                        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 pl-10 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-left"
                        dir="ltr" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="rounded text-primary focus:ring-primary">
                    <span class="text-slate-600">تذكرني</span>
                </label>
                <a href="#" class="text-primary hover:text-blue-700 font-medium">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" id="btn-login-submit"
                class="w-full bg-primary text-white font-bold rounded-xl py-3 shadow-md shadow-primary/30 hover:bg-blue-600 transition-all flex items-center justify-center gap-2">
                <span>تسجيل الدخول</span>
                <i class="fa-solid fa-arrow-left-long rtl-flip text-sm relative top-[1px]"></i>
            </button>
        </form>

        <!-- Only for Demo Purpose -->
        <div class="mt-6 p-4 bg-amber-50 rounded-xl border border-amber-100 text-amber-800 text-xs text-center">
            <i class="fa-solid fa-circle-info mb-1 block text-base"></i>
            للتجربة، يمكنك التسجيل لأول مرة وسيقوم النظام بإنشاء الحساب فوراً إذا لم يكن موجوداً (بناءً على إعدادات
            Supabase).
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-login-submit');
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        const originalHtml = btn.innerHTML;

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
        btn.disabled = true;

        try {
            // Attempt Sign In
            let { data, error } = await window.db.auth.signInWithPassword({
                email: email,
                password: pass
            });

            // If error and message is invalid credentials, let's try to Sign Up (For demo convenience)
            if (error && error.message.includes("Invalid login")) {
                const confirmSignUp = confirm("هذا الحساب غير موجود. هل تود إنشاء حساب جديد بهذه البيانات كمدير تجريبي لتسجيل الدخول؟");
                if (confirmSignUp) {
                    const { data: signUpData, error: signUpError } = await window.db.auth.signUp({
                        email: email,
                        password: pass
                    });

                    if (signUpError) throw signUpError;

                    if (signUpData.user) {
                        alert("تم إنشاء حسابك! يرجى الاستمرار كمسؤول.");
                        data = signUpData;
                        error = null;
                    } else {
                        throw new Error("يرجى مراجعة البريد لتفعيل الحساب (إذا كان إعداد تفعيل البريد مفعلاً في Supabase)");
                    }
                } else {
                    throw error;
                }
            } else if (error) {
                throw error;
            }

            if (data && data.session) {
                // Login Success
                // Update Layout visually (remove login overrides)
                window.location.hash = '#dashboard';
                // Reload app to reset layout overrides effectively
                setTimeout(() => window.location.reload(), 200);
            }

        } catch (error) {
            console.error(error);
            alert(error.message || "فشل تسجيل الدخول");
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    });
</script>
