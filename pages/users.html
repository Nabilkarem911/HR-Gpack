<div class="space-y-6">
    <!-- Header -->
    <div
        class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-user-shield text-emerald-500"></i>
                إدارة مستخدمي النظام (System Users)
            </h2>
            <p class="text-slate-500 mt-1 max-w-xl">هؤلاء هم الأشخاص المصرح لهم بالدخول للوحة التحكم والموارد البشرية.
                خصص صلاحياتهم بعناية.</p>
        </div>
        <div class="relative z-10 w-full md:w-auto mt-4 md:mt-0">
            <button onclick="openSystemUserModal()"
                class="bg-emerald-500 text-white px-5 py-2.5 rounded-lg shadow-sm hover:bg-emerald-600 transition-colors flex items-center justify-center gap-2 font-bold w-full md:w-auto">
                <i class="fa-solid fa-user-plus"></i> إضافة مستخدم نظام جديد
            </button>
        </div>
    </div>

    <!-- System Users Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto min-h-[300px] relative">
            <div id="users-loading"
                class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 hidden flex-col items-center justify-center">
                <div
                    class="animate-spin inline-block w-8 h-8 border-[3px] border-emerald-500 border-t-transparent rounded-full mb-3">
                </div>
            </div>

            <table class="w-full text-right" id="users-table">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm">
                    <tr>
                        <th class="px-5 py-4 font-bold">المستخدم / الايميل</th>
                        <th class="px-5 py-4 font-bold text-center">الدور (Role)</th>
                        <th class="px-5 py-4 font-bold text-center">المنشأة المخصصة</th>
                        <th class="px-5 py-4 font-bold text-center">الصلاحيات المخصصة</th>
                        <th class="px-5 py-4 font-bold text-center">إجراءات</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm" id="users-tbody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit System User Modal -->
<div id="sys-user-modal"
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh] overflow-hidden">

        <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50">
            <h3 class="font-bold text-lg text-slate-800" id="su-modal-title">إضافة مستخدم نظام جديد</h3>
            <button type="button" onclick="closeSystemUserModal()"
                class="text-slate-400 hover:text-red-500 transition-colors">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>

        <form id="sys-user-form" class="p-5 overflow-y-auto flex-1 space-y-5">
            <input type="hidden" id="su-id" value="">

            <!-- Basic Info Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">الاسم الكامل *</label>
                    <input type="text" id="su-name" required
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"
                        placeholder="مثال: أحمد الإداري">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">البريد الإلكتروني للذكول *</label>
                    <input type="email" id="su-email" required
                        class="w-full text-left border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"
                        dir="ltr" placeholder="admin@domain.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">رقم الجوال (اختياري)</label>
                    <input type="text" id="su-phone"
                        class="w-full text-left border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"
                        dir="ltr" placeholder="05XXXXXXXX">
                </div>
                <div id="su-pass-wrapper">
                    <label class="block text-sm font-bold text-slate-700 mb-1">كلمة المرور * <span id="su-pass-hint"
                            class="text-xs text-slate-400 font-normal hidden">(اتركه فارغاً للحفاظ على
                            القديمة)</span></label>
                    <input type="password" id="su-pass" required
                        class="w-full text-left border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"
                        dir="ltr" minlength="6" placeholder="******">
                </div>
            </div>

            <hr class="border-slate-100">

            <!-- RBAC Roles & Companies Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">الدور الأساسي (Role) *</label>
                    <select id="su-role" required
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 font-medium">
                        <option value="super_admin">مدير عام للنظام (Super Admin)</option>
                        <option value="hr_manager">مدير موارد بشرية (HR Manager)</option>
                        <option value="branch_manager">مدير فرع (Branch Manager)</option>
                        <option value="viewer">مُشاهد (Viewer)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">المنشأة المخصصة (الفرع)</label>
                    <select id="su-company"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 disabled:opacity-50 disabled:bg-slate-50">
                        <option value="">-- كل المنشآت (وصول شامل) --</option>
                    </select>
                </div>
            </div>

            <!-- Custom Permissions Matrix -->
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4">
                <h4 class="font-bold text-sm text-slate-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-emerald-600"></i> صلاحيات مخصصة (Custom Permissions)
                </h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm" id="permissions-grid">
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-manage_employees"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none">إدارة ملفات الموظفين</span>
                    </label>
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-manage_attendance"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none">إدارة وجدولة الحضور</span>
                    </label>
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-manage_requests"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none">الموافقة على الإجازات والسلف</span>
                    </label>
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-run_payroll"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none">تشغيل مسير الرواتب (Draft)</span>
                    </label>
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-approve_payroll"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none font-bold text-rose-700">اعتماد نهائي للرواتب
                            (Final)</span>
                    </label>
                    <label
                        class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" id="perm-manage_settings"
                            class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-slate-700 select-none">إدارة الإعدادات والقواعد</span>
                    </label>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3 pt-5 border-t border-slate-100">
                <button type="submit" id="btn-submit-su"
                    class="px-6 py-2.5 rounded-lg text-white bg-emerald-500 hover:bg-emerald-600 transition-colors font-bold text-sm flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-save"></i> حفظ البيانات
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // System State
    let systemUsersList = [];
    let companiesDict = {};
    let loggedInUserId = null;

    // Default Matrices
    const defaultPermissions = {
        'super_admin': {
            manage_employees: true, manage_attendance: true, manage_requests: true,
            run_payroll: true, approve_payroll: true, manage_settings: true
        },
        'hr_manager': {
            manage_employees: true, manage_attendance: true, manage_requests: true,
            run_payroll: true, approve_payroll: false, manage_settings: false
        },
        'branch_manager': {
            manage_employees: false, manage_attendance: true, manage_requests: true,
            run_payroll: false, approve_payroll: false, manage_settings: false
        },
        'viewer': {
            manage_employees: false, manage_attendance: false, manage_requests: false,
            run_payroll: false, approve_payroll: false, manage_settings: false
        }
    };

    const roleBadges = {
        'super_admin': { text: 'مدير عام', classes: 'bg-purple-100 text-purple-800 border border-purple-200', icon: 'fa-crown' },
        'hr_manager': { text: 'موارد بشرية', classes: 'bg-emerald-100 text-emerald-800 border border-emerald-200', icon: 'fa-user-tie' },
        'branch_manager': { text: 'مدير فرع', classes: 'bg-blue-100 text-blue-800 border border-blue-200', icon: 'fa-building' },
        'viewer': { text: 'مشاهد', classes: 'bg-slate-100 text-slate-600 border border-slate-200', icon: 'fa-eye' }
    };

    /* ==========================================================================
       INITIALIZATION
    ========================================================================== */
    async function initUsersModule() {
        if (!window.db) return;

        try {
            // Get Current Active User
            const { data: { user } } = await window.db.auth.getUser();
            if (user) loggedInUserId = user.id;

            // Load Companies for Dropdown
            const { data: cData } = await window.db.from('companies').select('id, name');
            const cSelect = document.getElementById('su-company');
            if (cData) {
                cData.forEach(c => {
                    companiesDict[c.id] = c.name;
                    cSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            }

            await loadSystemUsers();
        } catch (e) {
            console.error("Init Error:", e);
        }
    }

    /* ==========================================================================
       TABLE OPERATIONS (LIST & DELETE)
    ========================================================================== */
    async function loadSystemUsers() {
        const tbody = document.getElementById('users-tbody');
        const loader = document.getElementById('users-loading');
        loader.classList.remove('hidden'); loader.classList.add('flex');

        try {
            // Fetch users with explicit columns targeting RBAC upgrades natively mapped to JSONB
            const { data, error } = await window.db
                .from('system_users')
                .select('id, email, full_name, role, company_id, custom_permissions, phone')
                .order('created_at', { ascending: false });

            if (error) throw error;
            systemUsersList = data || [];

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-500 font-bold bg-slate-50/50">لا يوجد مستخدمين مسجلين.</td></tr>`;
                return;
            }

            let html = '';
            data.forEach((u, index) => {
                const b = roleBadges[u.role] || roleBadges['viewer'];
                const compName = u.company_id && companiesDict[u.company_id] ? companiesDict[u.company_id] : '<span class="text-purple-600 font-bold">وصول شامل للكل</span>';

                // Count permissions
                let permsObj = u.custom_permissions || {};
                if (typeof permsObj === 'string') { try { permsObj = JSON.parse(permsObj); } catch (err) { } }
                const permCount = Object.values(permsObj).filter(v => v === true).length;

                const isMe = (u.id === loggedInUserId) ? '<span class="bg-emerald-50 text-emerald-600 text-[10px] px-1.5 py-0.5 rounded border border-emerald-200 mr-2 font-bold">أنت</span>' : '';

                html += `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-5 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 border border-slate-200 flex items-center justify-center font-bold text-lg shadow-sm">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-slate-800 text-sm whitespace-nowrap">${u.full_name || 'مستخدم نظام'} ${isMe}</div>
                                    <div class="text-[12px] text-slate-500 font-mono mt-0.5" dir="ltr">${u.email || ''}</div>
                                    ${u.phone ? `<div class="text-[11px] text-slate-400 font-mono mt-0.5" dir="ltr">${u.phone}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        <td class="px-5 py-4 text-center">
                            <span class="px-2.5 py-1 ${b.classes} rounded-md text-[11px] font-bold inline-flex items-center gap-1.5 shadow-sm whitespace-nowrap">
                                <i class="fa-solid ${b.icon}"></i> ${b.text}
                            </span>
                        </td>
                        <td class="px-5 py-4 text-center text-[12px] font-medium text-slate-700">${compName}</td>
                        <td class="px-5 py-4 text-center text-[12px] text-slate-500 font-mono">
                            ${permCount > 0 ? `<span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded font-bold">${permCount}/6 نشطة</span>` : '<span class="text-slate-400">بدون تخصيص</span>'}
                        </td>
                        <td class="px-5 py-4 text-center w-28 text-nowrap">
                            <button onclick="editSystemUser(${index})" class="text-slate-400 hover:text-blue-600 transition-colors px-1 py-1" title="تعديل">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteSystemUser('${u.id}')" class="text-slate-400 hover:text-rose-600 transition-colors px-1 py-1" title="حذف" ${isMe ? 'disabled class="opacity-30 cursor-not-allowed"' : ''}>
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

        } catch (e) {
            console.error("Load users DB error:", e);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-red-500 font-bold bg-red-50">تأكد من تطبيق تعديلات الـ Database Schema (addition of custom_permissions and company_id).</td></tr>`;
        } finally {
            loader.classList.add('hidden'); loader.classList.remove('flex');
        }
    }

    window.deleteSystemUser = async function (id) {
        if (id === loggedInUserId) return alert('لا يمكنك حذف الحساب الخاص بك أثناء تسجيل الدخول منه.');
        if (!confirm('هل تريد فعلاً إزالة مستخدم النظام هذا؟ لن يستطيع تسجيل الدخول لاحقاً.')) return;

        try {
            const { error } = await window.db.from('system_users').delete().eq('id', id);
            if (error) throw error;
            alert('تم حذف المستخدم بنجاح.');
            loadSystemUsers();
        } catch (e) {
            console.error("Delete Error", e);
            alert('حدث خطأ أثناء محاولة الحذف.');
        }
    }


    /* ==========================================================================
       MODAL: CREATE & EDIT OPERATIONS
    ========================================================================== */
    const modalInstance = document.getElementById('sys-user-modal');

    window.openSystemUserModal = function () {
        if (modalInstance.parentNode !== document.body) document.body.appendChild(modalInstance);

        document.getElementById('su-modal-title').innerText = 'إضافة مستخدم نظام جديد';
        document.getElementById('su-id').value = '';
        document.getElementById('sys-user-form').reset();
        document.getElementById('su-phone').value = '';

        // Reset states for "New"
        document.getElementById('su-email').disabled = false;
        document.getElementById('su-pass').required = true;
        document.getElementById('su-pass-hint').classList.add('hidden');
        document.getElementById('su-role').value = 'hr_manager';
        document.getElementById('btn-submit-su').innerHTML = '<i class="fa-solid fa-user-plus"></i> إنشاء مستخدم';

        // Trigger smart matrix update naturally
        document.getElementById('su-role').dispatchEvent(new Event('change'));

        modalInstance.classList.remove('hidden'); modalInstance.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    window.editSystemUser = function (index) {
        const u = systemUsersList[index];
        if (!u) return;

        if (modalInstance.parentNode !== document.body) document.body.appendChild(modalInstance);

        document.getElementById('su-modal-title').innerText = 'تعديل صلاحيات المستخدم';
        document.getElementById('su-id').value = u.id;

        // Hydrate Basic Fields
        document.getElementById('su-name').value = u.full_name || '';
        document.getElementById('su-email').value = u.email || '';
        document.getElementById('su-phone').value = u.phone || '';

        document.getElementById('su-pass').required = false;
        document.getElementById('su-pass').value = '';
        document.getElementById('su-pass-hint').classList.remove('hidden');

        document.getElementById('su-role').value = u.role || 'viewer';
        document.getElementById('su-company').value = u.company_id || '';

        // Hydrate Permissions from JSONB safely
        let pObj = u.custom_permissions || {};
        if (typeof pObj === 'string') { try { pObj = JSON.parse(pObj); } catch (err) { } }

        // Apply Smart Defaults first based on Role
        document.getElementById('su-role').dispatchEvent(new Event('change'));

        // OVERRIDE with DB json mapped onto checkboxes manually
        if (Object.keys(pObj).length > 0) {
            ['manage_employees', 'manage_attendance', 'manage_requests', 'run_payroll', 'approve_payroll', 'manage_settings'].forEach(k => {
                const chx = document.getElementById('perm-' + k);
                if (chx && pObj.hasOwnProperty(k)) {
                    chx.checked = pObj[k] === true;
                }
            });
        }

        document.getElementById('btn-submit-su').innerHTML = '<i class="fa-solid fa-save"></i> حفظ التعديلات';
        modalInstance.classList.remove('hidden'); modalInstance.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    window.closeSystemUserModal = function () {
        modalInstance.classList.add('hidden'); modalInstance.classList.remove('flex');
        document.body.style.overflow = 'auto';
    }

    /* ==========================================================================
       RBAC UI DYNAMICS
    ========================================================================== */
    document.getElementById('su-role').addEventListener('change', function (e) {
        const role = this.value;
        const compDrop = document.getElementById('su-company');

        // 1. Branch Logic Override
        if (role === 'super_admin') {
            compDrop.value = '';
            compDrop.disabled = true;
        } else {
            compDrop.disabled = false;
            // Optionally, we could force them to pick if role === 'branch_manager' on submit
        }

        // 2. Smart Permissions Checkbox Toggling
        const mapping = defaultPermissions[role] || defaultPermissions['viewer'];
        Object.keys(mapping).forEach(k => {
            const chx = document.getElementById('perm-' + k);
            if (chx) chx.checked = mapping[k];
        });
    });

    /* ==========================================================================
       SUBMIT PAYLOAD (BUILDING JSON & DB UPSERT)
    ========================================================================== */
    document.getElementById('sys-user-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const isUpdate = document.getElementById('su-id').value !== '';
        const id = document.getElementById('su-id').value;
        const name = document.getElementById('su-name').value;
        const role = document.getElementById('su-role').value;
        const rawComp = document.getElementById('su-company').value;
        const comp = (role === 'super_admin' || rawComp === '') ? null : rawComp;

        // Validate Branch Manager requires a branch
        if (role === 'branch_manager' && !comp) {
            return alert('مدير الفرع يجب أن يكون مرتبطاً بمنشأة مخصصة محددة. يرجى اختيارها.');
        }

        // Build Custom Permissions JSON
        let jsonPerms = {};
        ['manage_employees', 'manage_attendance', 'manage_requests', 'run_payroll', 'approve_payroll', 'manage_settings'].forEach(k => {
            jsonPerms[k] = document.getElementById('perm-' + k).checked;
        });

        const btn = document.getElementById('btn-submit-su');
        const origText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';
        btn.disabled = true;

        const email = document.getElementById('su-email').value;
        const phone = document.getElementById('su-phone').value;

        try {
            if (isUpdate) {
                // UPDATE DB
                const payload = {
                    email: email,
                    phone: phone,
                    full_name: name,
                    role: role,
                    company_id: comp,
                    custom_permissions: jsonPerms
                };

                const { error } = await window.db.from('system_users').update(payload).eq('id', id);
                if (error) throw error;

                // If they changing password
                const pass = document.getElementById('su-pass').value;
                if (pass && pass.length >= 6) {
                    // Updating another user's auth password via client requires Supabase Admin API usually, 
                    // So we only warn the user here that Auth updates needs server functions.
                    console.log("Password change requested. Note: Supabase edge functions usually handle password changes for other users.");
                }

                alert('تم تحديث المستخدم بنجاح!');
                closeSystemUserModal();
                loadSystemUsers();
            } else {
                // CREATE NEW User Directly into system_users (Bypassing AuthsignUp client-side block)

                const payload = {
                    email: email,
                    phone: phone,
                    full_name: name,
                    role: role,
                    company_id: comp,
                    custom_permissions: jsonPerms
                };

                const { error: insertError } = await window.db.from('system_users').insert([payload]);

                if (insertError) throw insertError;

                alert('تم إنشاء المستخدم وتخصيص الصلاحيات بنجاح!');
                closeSystemUserModal();
                loadSystemUsers();
            }
        } catch (e) {
            console.error(e);
            alert(e.message || 'فشلت العملية.');
        } finally {
            if (btn) { btn.innerHTML = origText; btn.disabled = false; }
        }
    });

    // INIT
    initUsersModule();
</script>
